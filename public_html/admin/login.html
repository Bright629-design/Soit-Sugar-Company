<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Soit Sugar Company</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        border: "hsl(var(--border))",
                        input: "hsl(var(--input))",
                        ring: "hsl(var(--ring))",
                        background: "hsl(var(--background))",
                        foreground: "hsl(var(--foreground))",
                        primary: { DEFAULT: "hsl(var(--primary))", foreground: "hsl(var(--primary-foreground))" },
                        secondary: { DEFAULT: "hsl(var(--secondary))", foreground: "hsl(var(--secondary-foreground))" },
                        muted: { DEFAULT: "hsl(var(--muted))", foreground: "hsl(var(--muted-foreground))" },
                        accent: { DEFAULT: "hsl(var(--accent))", foreground: "hsl(var(--accent-foreground))" },
                    },
                    fontFamily: { body: ['"PT Sans"', 'sans-serif'], headline: ['"PT Sans"', 'sans-serif'] }
                }
            }
        }
    </script>
</head>

<body class="min-h-screen font-body antialiased flex flex-col items-center justify-center bg-muted/30">
    <div class="w-full max-w-md p-8 bg-card rounded-lg shadow-lg border">
        <div class="flex flex-col items-center mb-8">
            <i data-lucide="leaf" class="h-10 w-10 text-primary mb-2"></i>
            <h1 class="text-2xl font-bold font-headline">Admin Login</h1>
            <p class="text-muted-foreground">Enter your credentials to access the dashboard</p>
        </div>

        <form class="space-y-4">
            <div class="space-y-2">
                <label for="email" class="text-sm font-medium">Email</label>
                <input id="email" type="email" placeholder="admin@soitsugar.co.ke"
                    class="flex h-10 w-full rounded-md border border-input bg-background px-3 py-2 text-sm ring-offset-background file:border-0 file:bg-transparent file:text-sm file:font-medium placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2">
            </div>
            <div class="space-y-2">
                <label for="password" class="text-sm font-medium">Password</label>
                <input id="password" type="password"
                    class="flex h-10 w-full rounded-md border border-input bg-background px-3 py-2 text-sm ring-offset-background file:border-0 file:bg-transparent file:text-sm file:font-medium placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2">
            </div>
            <button type="submit"
                class="w-full inline-flex items-center justify-center whitespace-nowrap rounded-md text-sm font-medium bg-primary text-primary-foreground hover:bg-primary/90 h-10 px-4 py-2">
                Sign In
            </button>
        </form>

        <div class="mt-6 text-center">
            <a href="../index.html" class="text-sm text-muted-foreground hover:text-primary">Back to Website</a>
        </div>
    </div>

    <script src="../script.js"></script>
    <script>lucide.createIcons();</script>
</body>

</html>
